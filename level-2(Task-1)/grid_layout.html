<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Simple Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        
        .gallery-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .gallery-title {
            margin-top: 10px;
            font-size: 15px;
            color: #555;
            text-align: center;
        }
        .gallery-img:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }

    </style>
</head>

<body class="py-5">

<div class="container">
    <h2 class="text-center mb-5">Photo Gallery Grid</h2>

    <div class="row g-4">
        
        <div class="col-12 col-sm-6 col-lg-3">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400" class="gallery-img" alt="Mountains">
            <div class="gallery-title">Mountain View</div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400" class="gallery-img" alt="Forest">
            <div class="gallery-title">Forest Path</div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400" class="gallery-img" alt="Trees">
            <div class="gallery-title">Sunlight</div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400" class="gallery-img" alt="Peaks">
            <div class="gallery-title">Blue Peaks</div>
        </div>

    </div>
</div>

</body>
</html>
