<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slideshow</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .slider {
            width: 800px;
            height: 450px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .slides {
            display: flex;
            width: 400%;
            height: 100%;
            animation: slideshow 12s infinite;
        }

        .slides img {
            width: 25%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideshow {

            0%,
            20% {
                transform: translateX(0);
            }

            25%,
            45% {
                transform: translateX(-25%);
            }

            50%,
            70% {
                transform: translateX(-50%);
            }

            75%,
            95% {
                transform: translateX(-75%);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="slider">
        <div class="slides">

            <img src="/level-3(Task-1)/slide-1.avif" alt="Slide 1">

            <img src="/level-3(Task-1)/slide-2.avif" alt="Slide 2">

            <img src="/level-3(Task-1)/slide-3.avif" alt="Slide 3">

            <img src="/level-3(Task-1)/slide-4.avif" alt="Slide 4">

        </div>
    </div>

</body>

</html>
